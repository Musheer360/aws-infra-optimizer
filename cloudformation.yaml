AWSTemplateFormatVersion: '2010-09-09'
Description: 'CostOptimizer360 - AWS Infrastructure Optimization Scanner'

Resources:
  # S3 Bucket for Frontend
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${FrontendBucket.Arn}/*'

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CostOptimizer360LambdaExecutionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: CostOptimizer360Policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ReadOnlyScanAccess
                Effect: Allow
                Action:
                  - 'compute-optimizer:GetEC2InstanceRecommendations'
                  - 'compute-optimizer:GetEBSVolumeRecommendations'
                  - 'compute-optimizer:GetLambdaFunctionRecommendations'
                  - 'compute-optimizer:GetAutoScalingGroupRecommendations'
                  - 'compute-optimizer:GetIdleRecommendations'
                  - 'compute-optimizer:GetRDSDatabaseRecommendations'
                  - 'compute-optimizer:GetEnrollmentStatus'
                  - 'cost-optimization-hub:ListRecommendations'
                  - 'cost-optimization-hub:ListRecommendationSummaries'
                  - 'cost-optimization-hub:GetRecommendation'
                  - 'ce:GetReservationCoverage'
                  - 'ce:GetReservationUtilization'
                  - 'ce:GetSavingsPlansCoverage'
                  - 'ce:GetSavingsPlansUtilization'
                  - 'ce:GetSavingsPlansPurchaseRecommendation'
                  - 'ce:GetReservationPurchaseRecommendation'
                  - 'ce:GetRightsizingRecommendation'
                  - 'ce:GetCostForecast'
                  - 'ce:GetCostAndUsage'
                  - 'ec2:DescribeInstances'
                  - 'ec2:DescribeVolumes'
                  - 'ec2:DescribeSnapshots'
                  - 'ec2:DescribeImages'
                  - 'ec2:DescribeAddresses'
                  - 'ec2:DescribeNetworkInterfaces'
                  - 'ec2:DescribeRegions'
                  - 'ec2:DescribeReservedInstances'
                  - 'ec2:DescribeNatGateways'
                  - 'elasticloadbalancing:DescribeLoadBalancers'
                  - 'elasticloadbalancing:DescribeTags'
                  - 'rds:DescribeDBInstances'
                  - 'rds:DescribeReservedDBInstances'
                  - 'rds:ListTagsForResource'
                  - 'lambda:ListFunctions'
                  - 'lambda:GetFunction'
                  - 'lambda:ListTags'
                  - 'cloudwatch:GetMetricStatistics'
                  - 'cloudwatch:GetMetricData'
                  - 'cloudwatch:ListMetrics'
                  - 'autoscaling:DescribeAutoScalingGroups'
                  - 'pricing:GetProducts'
                  - 's3:ListAllMyBuckets'
                  - 's3:GetBucketLocation'
                  - 's3:GetBucketTagging'
                  - 's3:GetLifecycleConfiguration'
                  - 's3:ListBucketMultipartUploads'
                  - 's3:GetIntelligentTieringConfiguration'
                  - 's3:ListBucketIntelligentTieringConfigurations'
                  - 'dynamodb:ListTables'
                  - 'dynamodb:DescribeTable'
                  - 'dynamodb:ListTagsOfResource'
                  - 'savingsplans:DescribeSavingsPlans'
                Resource: '*'
              # Scope cross-account assume-role to our specific role name pattern
              # (not '*') so a compromised function cannot assume arbitrary roles.
              - Sid: AssumeCrossAccountScanRole
                Effect: Allow
                Action: 'sts:AssumeRole'
                Resource: 'arn:aws:iam::*:role/CostOptimizer360CrossAccountRole'

  # Lambda Function
  OptimizerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: CostOptimizer360Function
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          # Default cross-account ExternalId. Override per tenant for stronger
          # confused-deputy protection; must match the target-account role's
          # trust policy condition.
          EXTERNAL_ID: CostOptimizer360
      Code:
        ZipFile: |
          def lambda_handler(event, context):
              return {'statusCode': 200, 'body': 'Placeholder - will be updated by deploy script'}

  # Lambda Function URL (replaces API Gateway — no 30s timeout)
  FunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      TargetFunctionArn: !Ref OptimizerFunction
      Cors:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
        AllowHeaders:
          - Content-Type
        MaxAge: 300

  FunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OptimizerFunction
      Action: lambda:InvokeFunctionUrl
      Principal: '*'
      FunctionUrlAuthType: NONE

  FunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OptimizerFunction
      Action: lambda:InvokeFunction
      Principal: '*'

Outputs:
  FrontendURL:
    Value: !GetAtt FrontendBucket.WebsiteURL
    Description: Frontend website URL

  ApiEndpoint:
    Value: !GetAtt FunctionUrl.FunctionUrl
    Description: Lambda Function URL endpoint

  LambdaFunctionName:
    Value: !Ref OptimizerFunction
    Description: Lambda function name for code deployment
